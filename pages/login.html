<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome back | The Noirbrew Sanctuary</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/light/style.css">
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/style.css">

    <link rel="stylesheet" href="../assets/css/light-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <link rel="stylesheet" href="../assets/css/pages.css">
    <!-- Theme & Direction Persistence (pre-paint) -->
    <script>
        (function() {
            var theme = localStorage.getItem('noir-theme');
            var dir = localStorage.getItem('noir-dir');
            if (theme === 'light') document.documentElement.classList.add('light-mode-pending');
            if (dir) document.documentElement.dir = dir;
        })();
    </script>
</head>
<body class="dark-mode auth-body">
    <script>
        (function() {
            var theme = localStorage.getItem('noir-theme');
            if (theme === 'light') {
                document.body.classList.remove('dark-mode');
                document.body.classList.add('light-mode');
            }
        })();
    </script>

    <!-- Toggle Bar: Theme + RTL/LTR -->
    <div class="auth-toggles" id="authToggles">
        <!-- Theme Toggle -->
        <button class="auth-toggle-btn" id="authThemeToggle" aria-label="Toggle Light/Dark Theme" title="Toggle Theme">
            <i class="ph ph-moon dark-icon"></i>
            <i class="ph ph-sun light-icon"></i>
        </button>
        <div class="auth-toggle-divider"></div>
        <button class="auth-toggle-btn auth-rtl-btn" id="authDirToggle" aria-label="Toggle RTL/LTR Direction" title="Toggle Direction (RTL/LTR)">
            <span class="rtl-label">RTL</span>
        </button>
    </div>

    <div class="auth-wrapper">
        <!-- Back Link -->
        <a href="../index.html" class="auth-back-link"><i class="ph ph-arrow-left"></i> Back to Sanctuary</a>

        <div class="auth-card glass-card animate-on-scroll animate-visible">
            <div class="auth-header text-center">
                <a href="../index.html" class="brand-signature-v2 animate-on-scroll animate-visible">
                    <img src="../assets/images/logo-icon.svg" alt="Noirbrew Logo" class="nav-logo-icon">
                    <span class="b-noir">NOIR</span> <span class="b-brew">BREW</span>
                </a>
                <h1 class="Playfair">Welcome back <span class="wave">👋</span></h1>
                <p class="auth-subtitle">Verify your NR-Key to access private rituals and cellar logs.</p>
            </div>

            <!-- Social Auth -->
            <div class="social-auth-grid">
                <button class="social-btn"><i class="ph ph-google-logo"></i> Google</button>
                <button class="social-btn"><i class="ph ph-apple-logo"></i> Apple</button>
            </div>

            <div class="auth-divider"><span>OR</span></div>

            <!-- Login Form -->
            <form class="auth-form-v2">
                <div class="form-group-auth">
                    <label>Designated Email Address</label>
                    <input type="email" placeholder="curator@noirbrew.com" class="auth-field-v2" required>
                </div>
                <div class="form-group-auth">
                    <label>Sanctuary Password</label>
                    <div class="auth-password-wrapper">
                        <input type="password" placeholder="••••••••" class="auth-field-v2" id="passwordField" required>
                        <i class="ph ph-eye-closed" onclick="togglePassword()"></i>
                    </div>
                </div>

                <div class="auth-secondary-actions">
                    <label class="remember-me">
                        <input type="checkbox"> <span>Stay Synchronized</span>
                    </label>
                    <a href="#" class="gold-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-pill">Welcome back</button>
            </form>

            <div class="auth-footer text-center">
                <p>New to the Sanctuary? <a href="signup.html" class="gold-link">Create New Account</a></p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        function togglePassword() {
            const field = document.getElementById('passwordField');
            const icon = event.target;
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.replace('ph-eye-closed', 'ph-eye');
            } else {
                field.type = 'password';
                icon.classList.replace('ph-eye', 'ph-eye-closed');
            }
        }

        // Theme Toggle
        document.getElementById('authThemeToggle').addEventListener('click', function() {
            const body = document.body;
            const isLight = body.classList.toggle('light-mode');
            if (isLight) {
                body.classList.remove('dark-mode');
                localStorage.setItem('noir-theme', 'light');
            } else {
                body.classList.add('dark-mode');
                localStorage.setItem('noir-theme', 'dark');
            }
        });

        // RTL/LTR Toggle
        document.getElementById('authDirToggle').addEventListener('click', function() {
            const html = document.documentElement;
            const isRTL = html.dir === 'rtl';
            html.dir = isRTL ? 'ltr' : 'rtl';
            localStorage.setItem('noir-dir', html.dir);
            // Visual feedback on the button
            this.classList.toggle('active-toggle', !isRTL);
        });

        // On load: sync RTL button active state
        (function() {
            var dir = localStorage.getItem('noir-dir');
            if (dir === 'rtl') {
                var btn = document.getElementById('authDirToggle');
                if (btn) btn.classList.add('active-toggle');
            }
        })();
    </script>
</body>
</html>
